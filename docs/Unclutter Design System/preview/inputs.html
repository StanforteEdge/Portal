<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: #FDFCF8; font-family: 'Outfit', sans-serif; }
  .section-title { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #bbb; margin-bottom: 10px; margin-top: 4px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; margin-bottom: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px; max-width: 220px; }
  .field label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(43,40,39,0.45); }
  /* Journal inputs */
  .input-journal { background: rgba(43,40,39,0.05); border: none; border-radius: 16px; height: 52px; padding: 0 16px; font-family: 'Outfit', sans-serif; font-size: 14px; color: #2b2827; outline: none; width: 100%; box-sizing: border-box; }
  .input-journal:focus { box-shadow: 0 0 0 2px #ffce0a; }
  .input-journal::placeholder { color: rgba(43,40,39,0.3); }
  .input-with-icon { position: relative; }
  .input-with-icon .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: rgba(43,40,39,0.35); font-size: 14px; pointer-events: none; }
  .input-with-icon input { padding-left: 38px; }
  /* Estate inputs */
  .input-estate { background: #f3f4f5; border: none; border-radius: 16px; height: 52px; padding: 0 16px; font-family: 'Manrope', sans-serif; font-size: 14px; color: #0f172a; outline: none; width: 100%; box-sizing: border-box; }
  .input-estate:focus { box-shadow: 0 0 0 2px #2f9f45; }
  /* Segment control */
  .segment { display: flex; background: rgba(43,40,39,0.06); border-radius: 12px; padding: 4px; gap: 2px; width: fit-content; }
  .seg-btn { padding: 6px 16px; border-radius: 10px; border: none; font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; }
  .seg-btn.active { background: #2b2827; color: white; }
  .seg-btn:not(.active) { background: transparent; color: rgba(43,40,39,0.45); }
  /* Textarea */
  .textarea-journal { background: transparent; border: none; border-bottom: 1px solid rgba(43,40,39,0.1); border-radius: 0; padding: 10px 0; font-family: 'Outfit', sans-serif; font-size: 16px; color: #2b2827; outline: none; width: 100%; resize: none; line-height: 1.6; min-height: 64px; }
</style>
</head><body>
<div class="section-title">Journal / Main Inputs</div>
<div class="row">
  <div class="field">
    <label>Email</label>
    <div class="input-with-icon">
      <span class="icon">✉</span>
      <input class="input-journal" type="email" placeholder="your@email.com">
    </div>
  </div>
  <div class="field">
    <label>Password</label>
    <input class="input-journal" type="password" placeholder="••••••••">
  </div>
  <div class="field">
    <label>Note Title</label>
    <input class="input-journal" type="text" placeholder="Name this journal...">
  </div>
</div>
<div class="section-title">Estate Inputs (Manrope)</div>
<div class="row">
  <div class="field">
    <label style="font-family:'Manrope'">Unit Name</label>
    <input class="input-estate" type="text" placeholder="e.g. Unit A">
  </div>
  <div class="field">
    <label style="font-family:'Manrope'">Amount (₦)</label>
    <input class="input-estate" type="number" placeholder="0.00">
  </div>
</div>
<div class="section-title">Segment Control</div>
<div class="row">
  <div class="segment">
    <button class="seg-btn active">Journals</button>
    <button class="seg-btn">Entries</button>
  </div>
  <div class="segment">
    <button class="seg-btn active">Income</button>
    <button class="seg-btn">Expense</button>
    <button class="seg-btn">Transfer</button>
  </div>
</div>
<div class="section-title">Free-write Textarea</div>
<div class="row">
  <div class="field" style="max-width:400px">
    <textarea class="textarea-journal" placeholder="Start with one sentence..."></textarea>
  </div>
</div>
</body></html>
