<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #FDFCF8; font-family: 'Outfit', sans-serif; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
  .eyebrow { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 4px; }
  .title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .sub { font-size: 12px; margin-top: 4px; }
  /* Standard card */
  .card-std { background: white; border-radius: 32px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid rgba(43,40,39,0.05); max-width: 190px; }
  /* Dark hero card */
  .card-hero { background: #2b2827; border-radius: 40px; padding: 24px; box-shadow: 0 25px 44px rgba(43,40,39,0.20); color: white; max-width: 200px; position: relative; overflow: hidden; }
  .card-hero::after { content:''; position: absolute; top:0; right:0; width:80px; height:80px; background: rgba(255,206,10,0.1); border-radius: 0 40px 0 64px; }
  /* Estate dark */
  .card-estate { border-radius: 24px; padding: 20px; color: white; max-width: 180px; position: relative; overflow: hidden; background: linear-gradient(145deg, #041920, #15333d); box-shadow: 0 25px 44px rgba(0,0,0,0.25); }
  .card-estate::before { content:''; position:absolute; right:-44px; top:-44px; width:120px; height:120px; border-radius:50%; background: rgba(255,255,255,0.05); filter: blur(18px); }
  /* Stat card */
  .card-stat { background: rgba(255,255,255,0.7); backdrop-filter: blur(12px); border-radius: 16px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); max-width: 150px; }
  /* Dashed new card */
  .card-new { border: 2px dashed rgba(43,40,39,0.10); border-radius: 32px; padding: 20px; max-width: 180px; display: flex; flex-direction: column; align-items: center; gap: 8px; color: rgba(43,40,39,0.25); }
  .icon-box { width: 40px; height: 40px; border-radius: 50%; background: rgba(43,40,39,0.05); display: flex; align-items: center; justify-content: center; font-size: 18px; }
</style>
</head><body>
<div class="row">
  <div class="card-std">
    <div class="eyebrow" style="color:#ffce0a">Sanctuaries</div>
    <div class="title" style="color:#2b2827">Daily Journal</div>
    <div class="sub" style="color:rgba(43,40,39,0.4)">12 Reflections</div>
  </div>
  <div class="card-hero">
    <div class="eyebrow" style="color:rgba(255,206,10,0.6)">Recommended</div>
    <div class="title" style="font-size:22px; margin-top:8px">Morning Check-in</div>
    <div class="sub" style="color:rgba(255,255,255,0.4);font-style:italic">Set your tone for today</div>
  </div>
  <div class="card-estate">
    <div class="eyebrow" style="color:#7cb380;position:relative;z-index:1">Estate Power</div>
    <div class="title" style="font-family:'Manrope';font-size:20px;font-weight:800;letter-spacing:-0.04em;margin-top:8px;position:relative;z-index:1">Unit A · Block 2</div>
    <div class="sub" style="color:rgba(255,255,255,0.4);position:relative;z-index:1">3 occupants · ₦42,000</div>
  </div>
  <div class="card-stat">
    <div class="eyebrow" style="color:#aaa;font-size:9px">Total Balance</div>
    <div style="font-size:28px;font-weight:300;letter-spacing:-0.03em;color:#0f172a;margin-top:4px">₦248k</div>
    <div style="font-size:10px;color:#10b981;margin-top:4px">↑ 12% this month</div>
  </div>
  <div class="card-new">
    <div class="icon-box">＋</div>
    <span style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:0.15em">New Entry</span>
    <span style="font-size:10px;text-align:center;opacity:0.6;line-height:1.4">Start with one sentence</span>
  </div>
</div>
</body></html>
