<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: #FDFCF8; font-family: 'Outfit', sans-serif; }
  .group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .section-title { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #bbb; margin-bottom: 8px; }
  .card { background: white; border-radius: 16px; padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; min-width: 160px; }
  .eyebrow { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; }
  .heading { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; color: #2b2827; }
  .sub { font-size: 12px; color: rgba(43,40,39,0.4); }
</style>
</head><body>
<div class="section-title">Eyebrow + Heading Combos</div>
<div class="group">
  <div class="card">
    <span class="eyebrow" style="color:#ffce0a">Recommended</span>
    <span class="heading">Morning Check-in</span>
    <span class="sub">Set your tone for today</span>
  </div>
  <div class="card">
    <span class="eyebrow" style="color:#7cb380">Estate Power</span>
    <span class="heading" style="font-family:'Manrope';font-size:20px;font-weight:800;letter-spacing:-0.04em">Dashboard</span>
    <span class="sub">Track your units & usage</span>
  </div>
  <div class="card">
    <span class="eyebrow" style="color:#10b981">Overview</span>
    <span class="heading">₦ 248,500</span>
    <span class="sub">Total balance</span>
  </div>
  <div class="card">
    <span class="eyebrow" style="color:#6366f1">Module 3</span>
    <span class="heading">Getting Started</span>
    <span class="sub">4 lessons · 22 min</span>
  </div>
</div>
<div class="section-title">Badge / Tag Patterns</div>
<div class="group" style="align-items:center">
  <span style="background:#fff8e1;color:#b7791f;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;border-radius:999px;padding:4px 10px">3 Day Rhythm 🔥</span>
  <span style="background:#dff7d8;color:#2d8a35;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;border-radius:999px;padding:4px 10px">Credit</span>
  <span style="background:#fee2e2;color:#dc2626;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;border-radius:999px;padding:4px 10px">Owes</span>
  <span style="background:#fff4d6;color:#b7791f;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;border-radius:999px;padding:4px 10px">Warning</span>
  <span style="background:#e0e7ff;color:#4338ca;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;border-radius:999px;padding:4px 10px">In Progress</span>
  <span style="background:rgba(43,40,39,0.05);color:rgba(43,40,39,0.4);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;border-radius:999px;padding:4px 10px">Neutral</span>
</div>
</body></html>
