<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: #f5f5f5; font-family: 'Outfit', sans-serif; }
  .section-title { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #bbb; margin-bottom: 10px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; align-items: flex-end; }
  .block { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .box { background: #2b2827; }
  .label { font-size: 9px; font-weight: 700; color: #999; text-align: center; font-family: monospace; }
  .radius-sample { width: 56px; height: 40px; background: #ffce0a; }
  .space-bar { height: 12px; background: #10b981; border-radius: 3px; }
</style>
</head><body>
<div class="section-title">Border Radius Scale</div>
<div class="row">
  <div class="block"><div class="radius-sample" style="border-radius:4px"></div><div class="label">4px<br>sm</div></div>
  <div class="block"><div class="radius-sample" style="border-radius:8px"></div><div class="label">8px<br>xs</div></div>
  <div class="block"><div class="radius-sample" style="border-radius:12px"></div><div class="label">12px<br>btn</div></div>
  <div class="block"><div class="radius-sample" style="border-radius:16px"></div><div class="label">16px<br>md</div></div>
  <div class="block"><div class="radius-sample" style="border-radius:20px"></div><div class="label">20px<br>input</div></div>
  <div class="block"><div class="radius-sample" style="border-radius:24px"></div><div class="label">24px<br>card</div></div>
  <div class="block"><div class="radius-sample" style="border-radius:32px"></div><div class="label">32px<br>xl</div></div>
  <div class="block"><div class="radius-sample" style="border-radius:40px"></div><div class="label">40px<br>hero</div></div>
  <div class="block"><div class="radius-sample" style="border-radius:999px;width:56px"></div><div class="label">999px<br>pill</div></div>
</div>
<div class="section-title">Spacing Scale</div>
<div class="row" style="align-items:center">
  <div class="block"><div class="space-bar" style="width:4px"></div><div class="label">4</div></div>
  <div class="block"><div class="space-bar" style="width:8px"></div><div class="label">8</div></div>
  <div class="block"><div class="space-bar" style="width:12px"></div><div class="label">12</div></div>
  <div class="block"><div class="space-bar" style="width:16px"></div><div class="label">16</div></div>
  <div class="block"><div class="space-bar" style="width:20px"></div><div class="label">20</div></div>
  <div class="block"><div class="space-bar" style="width:24px"></div><div class="label">24</div></div>
  <div class="block"><div class="space-bar" style="width:32px"></div><div class="label">32</div></div>
  <div class="block"><div class="space-bar" style="width:40px"></div><div class="label">40</div></div>
  <div class="block"><div class="space-bar" style="width:48px"></div><div class="label">48</div></div>
  <div class="block"><div class="space-bar" style="width:64px"></div><div class="label">64</div></div>
</div>
</body></html>
