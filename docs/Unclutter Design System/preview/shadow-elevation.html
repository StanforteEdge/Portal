<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #eceeed; font-family: 'Outfit', sans-serif; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .card { background: white; border-radius: 16px; padding: 14px 16px; min-width: 100px; }
  .label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #aaa; margin-bottom: 4px; }
  .val { font-size: 8px; color: #ccc; font-family: monospace; }
</style>
</head><body>
<div class="row">
  <div class="card" style="box-shadow:none; border:1px solid rgba(0,0,0,0.06)"><div class="label">Flat</div><div class="val">none + border</div></div>
  <div class="card" style="box-shadow:0 2px 8px rgba(0,0,0,0.06)"><div class="label">xs</div><div class="val">0 2 8 0.06</div></div>
  <div class="card" style="box-shadow:0 4px 16px rgba(0,0,0,0.08)"><div class="label">sm</div><div class="val">0 4 16 0.08</div></div>
  <div class="card" style="box-shadow:0 10px 30px rgba(0,0,0,0.08)"><div class="label">md</div><div class="val">0 10 30 0.08</div></div>
  <div class="card" style="box-shadow:0 20px 50px rgba(15,23,42,0.10)"><div class="label">lg</div><div class="val">0 20 50 0.10</div></div>
  <div class="card" style="box-shadow:0 25px 44px rgba(15,23,42,0.16)"><div class="label">xl</div><div class="val">0 25 44 0.16</div></div>
  <div class="card" style="background:#2b2827;color:white;box-shadow:0 25px 44px rgba(43,40,39,0.20)"><div class="label" style="color:rgba(255,255,255,0.4)">Hero</div><div class="val" style="color:rgba(255,255,255,0.25)">charcoal hero</div></div>
  <div class="card" style="background:linear-gradient(145deg,#041920,#15333d);color:white;box-shadow:0 25px 44px rgba(0,0,0,0.25)"><div class="label" style="color:rgba(255,255,255,0.4)">Estate</div><div class="val" style="color:rgba(255,255,255,0.25)">dark gradient</div></div>
  <div class="card" style="box-shadow:0 24px 80px rgba(15,23,42,0.24)"><div class="label">Modal</div><div class="val">0 24 80 0.24</div></div>
</div>
</body></html>
