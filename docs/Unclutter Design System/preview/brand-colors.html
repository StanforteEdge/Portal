<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #f5f5f5; font-family: 'Outfit', sans-serif; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch { width: 80px; }
  .chip { height: 60px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.06); }
  .label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #666; margin-top: 5px; }
  .val { font-size: 9px; color: #999; font-family: monospace; }
  .section { margin-bottom: 20px; }
  .section-title { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #aaa; margin-bottom: 10px; }
  .app-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .app-chip { height: 36px; border-radius: 10px; display: flex; align-items: center; padding: 0 14px; gap: 8px; font-size: 11px; font-weight: 700; color: white; flex: 1; max-width: 200px; }
  .app-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); }
</style>
</head><body>
<div class="section">
  <div class="section-title">Base Brand</div>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#ffce0a"></div><div class="label">Gold</div><div class="val">#ffce0a</div></div>
    <div class="swatch"><div class="chip" style="background:#F7B928"></div><div class="label">Gold Dim</div><div class="val">#F7B928</div></div>
    <div class="swatch"><div class="chip" style="background:#fff8e1; border:1px solid #ffe082"></div><div class="label">Gold Light</div><div class="val">#fff8e1</div></div>
    <div class="swatch"><div class="chip" style="background:#2b2827"></div><div class="label">Charcoal</div><div class="val">#2b2827</div></div>
    <div class="swatch"><div class="chip" style="background:#FDFCF8; border:1px solid #e5e3de"></div><div class="label">Warm BG</div><div class="val">#FDFCF8</div></div>
    <div class="swatch"><div class="chip" style="background:#ffffff; border:1px solid #eee"></div><div class="label">Card BG</div><div class="val">#ffffff</div></div>
  </div>
</div>
<div class="section">
  <div class="section-title">Per-App Accents</div>
  <div class="app-chip" style="background:#2b2827; max-width:none; margin-bottom:6px;"><div class="app-dot"></div>Journal / Main — #ffce0a<div style="width:18px;height:18px;border-radius:5px;background:#ffce0a;margin-left:auto"></div></div>
  <div class="app-chip" style="background:#064e3b; max-width:none; margin-bottom:6px;"><div class="app-dot"></div>Finance — #10b981<div style="width:18px;height:18px;border-radius:5px;background:#10b981;margin-left:auto"></div></div>
  <div class="app-chip" style="background:#041920; max-width:none; margin-bottom:6px;"><div class="app-dot"></div>Estate — #2f9f45 / #041920<div style="width:18px;height:18px;border-radius:5px;background:#2f9f45;margin-left:auto"></div></div>
  <div class="app-chip" style="background:#881337; max-width:none; margin-bottom:6px;"><div class="app-dot"></div>Consult — #f43f5e<div style="width:18px;height:18px;border-radius:5px;background:#f43f5e;margin-left:auto"></div></div>
  <div class="app-chip" style="background:#312e81; max-width:none; margin-bottom:6px;"><div class="app-dot"></div>Learning — #6366f1<div style="width:18px;height:18px;border-radius:5px;background:#6366f1;margin-left:auto"></div></div>
</div>
</body></html>
