<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: #FDFCF8; font-family: 'Outfit', sans-serif; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .section-title { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #bbb; margin-bottom: 8px; margin-top: 4px; }
  button { cursor: pointer; border: none; font-family: inherit; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; }
  /* Primary */
  .btn-primary { background: #ffce0a; color: #2b2827; border-radius: 16px; padding: 0 20px; height: 48px; font-size: 15px; box-shadow: 0 4px 16px rgba(255,206,10,0.3); }
  /* Secondary */
  .btn-secondary { background: #2b2827; color: white; border-radius: 16px; padding: 0 20px; height: 48px; font-size: 15px; }
  /* Ghost */
  .btn-ghost { background: transparent; color: #2b2827; border-radius: 16px; padding: 0 16px; height: 44px; font-size: 14px; }
  /* Outline */
  .btn-outline { background: transparent; color: #2b2827; border: 1.5px solid rgba(43,40,39,0.2); border-radius: 16px; padding: 0 20px; height: 44px; font-size: 14px; }
  /* Muted */
  .btn-muted { background: rgba(43,40,39,0.07); color: #2b2827; border-radius: 16px; padding: 0 20px; height: 44px; font-size: 14px; }
  /* Destructive */
  .btn-danger { background: #ba1a1a; color: white; border-radius: 16px; padding: 0 20px; height: 44px; font-size: 14px; }
  /* Icon button */
  .btn-icon { background: rgba(43,40,39,0.07); color: #2b2827; border-radius: 12px; width: 40px; height: 40px; padding: 0; justify-content: center; font-size: 16px; }
  /* Full-width */
  .btn-full { width: 100%; max-width: 280px; background: #2b2827; color: white; border-radius: 16px; height: 52px; font-size: 16px; justify-content: center; }
  /* Size sm */
  .btn-sm { background: #ffce0a; color: #2b2827; border-radius: 10px; padding: 0 14px; height: 36px; font-size: 12px; }
  /* Estate */
  .btn-estate { background: #041920; color: white; border-radius: 12px; padding: 0 20px; height: 48px; font-size: 14px; font-family: 'Manrope', sans-serif; font-weight: 600; }
  .btn-estate-sec { background: #f3f4f5; color: #0f172a; border-radius: 12px; padding: 0 20px; height: 48px; font-size: 14px; font-family: 'Manrope', sans-serif; font-weight: 600; }
</style>
</head><body>
<div class="section-title">Journal / Main Buttons</div>
<div class="row">
  <button class="btn-primary">Primary</button>
  <button class="btn-secondary">Secondary</button>
  <button class="btn-muted">Muted</button>
  <button class="btn-outline">Outline</button>
  <button class="btn-ghost">Ghost</button>
  <button class="btn-danger">Destructive</button>
  <button class="btn-icon">✦</button>
  <button class="btn-sm">Small</button>
</div>
<div class="section-title">Full Width CTA</div>
<div class="row">
  <button class="btn-full">I'm done for now</button>
</div>
<div class="section-title">Estate Buttons</div>
<div class="row">
  <button class="btn-estate">Add Occupant</button>
  <button class="btn-estate-sec">Cancel</button>
</div>
</body></html>
