<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #FDFCF8; font-family: 'Outfit', sans-serif; }
  .section-title { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #bbb; margin-bottom: 10px; }
  .phone-shell { width: 300px; border-radius: 32px; overflow: hidden; background: #FDFCF8; border: 1px solid rgba(0,0,0,0.08); box-shadow: 0 20px 50px rgba(0,0,0,0.10); margin-bottom: 16px; display: inline-block; }
  /* Journal nav */
  .journal-nav { display: grid; grid-template-columns: repeat(4, 1fr); padding: 10px 12px 16px; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(43,40,39,0.06); box-shadow: 0 -4px 20px rgba(0,0,0,0.04); gap: 4px; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 4px; border-radius: 12px; cursor: pointer; }
  .nav-item.active { background: #2b2827; }
  .nav-icon { font-size: 18px; line-height: 1; }
  .nav-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
  .nav-item.active .nav-label { color: white; }
  .nav-item:not(.active) .nav-label { color: rgba(43,40,39,0.35); }
  /* Estate nav */
  .estate-nav { display: grid; grid-template-columns: repeat(5, 1fr); padding: 10px 10px 16px; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(43,40,39,0.06); box-shadow: 0 -4px 20px rgba(0,0,0,0.04); gap: 2px; }
  .estate-nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 4px; border-radius: 10px; cursor: pointer; text-decoration: none; }
  .estate-nav-item.active { background: #041920; }
  .estate-nav-item .nav-label { font-family: 'Manrope', sans-serif; font-size: 9px; font-weight: 700; }
  .estate-nav-item.active .nav-label { color: white; }
  .estate-nav-item:not(.active) .nav-label { color: rgba(15,23,42,0.4); }
  .row { display: flex; gap: 20px; flex-wrap: wrap; }
</style>
</head><body>
<div class="row">
  <div>
    <div class="section-title">Journal — 4-Tab</div>
    <div class="phone-shell">
      <div style="height:60px;background:#FDFCF8"></div>
      <div class="journal-nav">
        <div class="nav-item active"><span class="nav-icon">⌂</span><span class="nav-label">Home</span></div>
        <div class="nav-item"><span class="nav-icon">📖</span><span class="nav-label">Journal</span></div>
        <div class="nav-item"><span class="nav-icon">◎</span><span class="nav-label">Wall</span></div>
        <div class="nav-item"><span class="nav-icon">◉</span><span class="nav-label">Profile</span></div>
      </div>
    </div>
  </div>
  <div>
    <div class="section-title">Estate — 5-Tab (Manrope)</div>
    <div class="phone-shell">
      <div style="height:60px;background:#f8f9fa"></div>
      <div class="estate-nav">
        <div class="estate-nav-item active"><span class="nav-icon" style="font-size:16px">⊞</span><span class="nav-label">Home</span></div>
        <div class="estate-nav-item"><span class="nav-icon" style="font-size:16px">⬡</span><span class="nav-label">Units</span></div>
        <div class="estate-nav-item"><span class="nav-icon" style="font-size:16px">⊙</span><span class="nav-label">Meters</span></div>
        <div class="estate-nav-item"><span class="nav-icon" style="font-size:16px">≡</span><span class="nav-label">Records</span></div>
        <div class="estate-nav-item"><span class="nav-icon" style="font-size:16px">⚙</span><span class="nav-label">Setup</span></div>
      </div>
    </div>
  </div>
</div>
</body></html>
