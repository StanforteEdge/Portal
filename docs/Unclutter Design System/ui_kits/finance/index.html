<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unclutter Finance — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #e8ecef; font-family: 'Outfit', sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 24px 16px; }
.phone { width: 390px; height: 844px; background: #ffffff; border-radius: 48px; overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.08); position: relative; }
</style>
</head>
<body>
<script type="text/babel">
const { useState, useEffect } = React;

const F = {
  green: '#10b981', greenLight: '#d1fae5', greenDark: '#064e3b',
  charcoal: '#2b2827', text: '#0f172a', textMuted: '#64748b', textFaint: 'rgba(15,23,42,0.35)',
  bg: '#f8fafc', white: '#ffffff', muted: '#f1f5f9', border: '#e2e8f0',
  red: '#dc2626', redLight: '#fee2e2', gold: '#ffce0a',
  warmBg: '#FFFDF6',
};

const Logo = ({ size = 28 }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
    <svg width={size} height={size} viewBox="0 0 512 512" fill="none">
      <path d="M256 464C256 464 160 384 128 304C96 224 128 128 128 128C128 128 224 160 304 192C384 224 464 320 464 320C464 320 384 416 304 448C224 480 256 464 256 464Z" stroke={F.greenDark} strokeWidth="14" strokeLinecap="round" strokeLinejoin="round" fill={F.green} fillOpacity="0.25"/>
      <path d="M256 464C256 464 352 384 384 304C416 224 384 128 384 128C384 128 288 160 208 192C128 224 48 320 48 320C48 320 128 416 208 448C288 480 256 464 256 464Z" stroke={F.greenDark} strokeWidth="14" strokeLinecap="round" strokeLinejoin="round" fill={F.green} fillOpacity="0.25"/>
      <path d="M256 80V464" stroke={F.greenDark} strokeWidth="14" strokeLinecap="round"/>
    </svg>
    <div style={{ lineHeight: 1 }}>
      <span style={{ fontSize: 15, fontWeight: 700, letterSpacing: '-0.02em', color: F.greenDark }}><span style={{ color: F.green }}>Un</span>clutter</span>
      <span style={{ fontSize: 9, fontWeight: 500, color: F.textFaint, marginLeft: 4 }}>Finance</span>
    </div>
  </div>
);

const Icon = ({ name, size = 20, color = F.textMuted }) => {
  const p = {
    home: <><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
    wallet: <><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 3H8a2 2 0 0 0-2 2v2h12V5a2 2 0 0 0-2-2z"/><circle cx="16" cy="13" r="2"/></>,
    target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
    barChart: <><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,
    settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
    bell: <><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
    arrowUp: <><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></>,
    arrowDown: <><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></>,
    plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    chevRight: <><polyline points="9 18 15 12 9 6"/></>,
    mail: <><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>,
    eye: <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
    eyeOff: <><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></>,
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">{p[name]}</svg>;
};

const BottomNav = ({ active, onNav }) => {
  const items = [
    { id: 'home', label: 'Home', icon: 'home' },
    { id: 'transactions', label: 'Spending', icon: 'wallet' },
    { id: 'goals', label: 'Goals', icon: 'target' },
    { id: 'reports', label: 'Reports', icon: 'barChart' },
    { id: 'settings', label: 'More', icon: 'settings' },
  ];
  return (
    <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, display: 'grid', gridTemplateColumns: 'repeat(5,1fr)', padding: '10px 8px 18px', background: 'rgba(255,255,255,0.92)', backdropFilter: 'blur(20px)', borderTop: `1px solid ${F.border}`, boxShadow: '0 -4px 20px rgba(0,0,0,0.04)', zIndex: 50 }}>
      {items.map(i => (
        <button key={i.id} onClick={() => onNav(i.id)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '6px 4px', borderRadius: 10, border: 'none', cursor: 'pointer', background: active === i.id ? F.charcoal : 'transparent' }}>
          <Icon name={i.icon} size={18} color={active === i.id ? F.gold : F.textFaint} />
          <span style={{ fontSize: 9, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.1em', color: active === i.id ? 'white' : F.textFaint }}>{i.label}</span>
        </button>
      ))}
    </div>
  );
};

const LoginScreen = ({ onLogin }) => (
  <div style={{ height: '100%', background: F.warmBg, display: 'flex', flexDirection: 'column', padding: '60px 28px 32px' }}>
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10, marginBottom: 48 }}>
      <Logo size={52} />
      <p style={{ fontSize: 13, color: F.textMuted, fontStyle: 'italic', textAlign: 'center', marginTop: 4 }}>Track every naira. Grow every goal.</p>
    </div>
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 20 }}>
      <div style={{ position: 'relative' }}>
        <span style={{ position: 'absolute', left: 16, top: '50%', transform: 'translateY(-50%)' }}><Icon name="mail" size={16} color={F.textMuted} /></span>
        <input placeholder="Email" style={{ width: '100%', height: 52, background: F.muted, border: `1px solid ${F.border}`, borderRadius: 16, paddingLeft: 44, fontFamily: 'Outfit', fontSize: 14, outline: 'none' }} />
      </div>
      <input type="password" placeholder="Password" style={{ width: '100%', height: 52, background: F.muted, border: `1px solid ${F.border}`, borderRadius: 16, padding: '0 16px', fontFamily: 'Outfit', fontSize: 14, outline: 'none' }} />
    </div>
    <button onClick={onLogin} style={{ width: '100%', height: 52, background: F.charcoal, color: 'white', border: 'none', borderRadius: 18, fontSize: 15, fontWeight: 700, fontFamily: 'Outfit', cursor: 'pointer' }}>Sign In</button>
    <p style={{ textAlign: 'center', marginTop: 20, fontSize: 13, color: F.textMuted }}>New here? <span style={{ color: F.green, fontWeight: 700, cursor: 'pointer' }}>Create Account</span></p>
  </div>
);

const HomeScreen = ({ onNav, calmMode }) => {
  const stats = [
    { label: 'Total Balance', value: '₦ 248,500', icon: 'wallet', trend: 'up', trendVal: '+8.2%' },
    { label: 'Monthly Spend', value: '₦ 62,300', icon: 'arrowDown', trend: 'down', trendVal: '−3.1%' },
    { label: 'Monthly Income', value: '₦ 180,000', icon: 'arrowUp', trend: 'up', trendVal: '+12%' },
    { label: 'Active Goals', value: '3', icon: 'target', trend: 'neutral', trendVal: '' },
  ];
  const txns = [
    { name: 'Jumia Shopping', cat: 'Shopping', amount: -4200, date: 'Today', icon: '🛍️' },
    { name: 'Salary Deposit', cat: 'Income', amount: 180000, date: 'Yesterday', icon: '💰' },
    { name: 'DSTV Subscription', cat: 'Utilities', amount: -2500, date: 'Apr 19', icon: '📺' },
    { name: 'GTB Savings', cat: 'Savings', amount: -20000, date: 'Apr 18', icon: '🏦' },
  ];
  const blur = calmMode ? { filter: 'blur(8px)', userSelect: 'none', opacity: 0.5 } : {};
  return (
    <div style={{ height: '100%', overflowY: 'auto', paddingBottom: 88, background: F.warmBg }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '20px 20px 0', borderBottom: `1px solid rgba(16,185,129,0.08)`, paddingBottom: 12, background: 'rgba(255,253,246,0.8)', backdropFilter: 'blur(12px)' }}>
        <Logo size={26} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          {calmMode && <span style={{ fontSize: 10, fontWeight: 700, background: '#d1fae5', color: F.green, borderRadius: 999, padding: '3px 10px' }}>Calm Mode</span>}
          <div style={{ width: 36, height: 36, borderRadius: 999, background: `${F.green}15`, border: `2px solid ${F.greenLight}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, fontWeight: 700, color: F.greenDark }}>A</div>
        </div>
      </div>
      {/* Welcome */}
      <div style={{ padding: '20px 20px 0' }}>
        <p style={{ fontSize: 10, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.2em', color: `${F.green}` }}>Overview</p>
        <h1 style={{ fontSize: 24, fontWeight: 700, letterSpacing: '-0.02em', color: F.charcoal, marginTop: 2 }}>Good morning, Alex</h1>
        <p style={{ fontSize: 13, color: F.textMuted, marginTop: 2 }}>Here's your financial snapshot.</p>
      </div>
      {/* Stat cards */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, padding: '16px 20px 0' }}>
        {stats.map(s => (
          <div key={s.label} style={{ background: 'rgba(255,255,255,0.7)', backdropFilter: 'blur(12px)', borderRadius: 16, padding: '14px', boxShadow: '0 2px 8px rgba(0,0,0,0.04)' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
              <span style={{ fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.12em', color: F.textMuted }}>{s.label}</span>
              <div style={{ width: 32, height: 32, borderRadius: '50%', background: F.muted, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name={s.icon} size={14} color={F.textMuted} /></div>
            </div>
            <div style={{ fontSize: 22, fontWeight: 300, letterSpacing: '-0.03em', color: F.text, ...blur }}>{s.value}</div>
            {s.trendVal && !calmMode && (
              <span style={{ fontSize: 10, fontWeight: 600, background: s.trend === 'up' ? '#ecfdf5' : s.trend === 'down' ? '#fef2f2' : F.muted, color: s.trend === 'up' ? '#059669' : s.trend === 'down' ? F.red : F.textMuted, borderRadius: 999, padding: '2px 7px', marginTop: 6, display: 'inline-block' }}>
                {s.trend === 'up' ? '↑' : '↓'} {s.trendVal}
              </span>
            )}
          </div>
        ))}
      </div>
      {/* Budget progress */}
      <div style={{ margin: '16px 20px 0', background: 'white', borderRadius: 16, padding: '14px 16px', boxShadow: '0 2px 8px rgba(0,0,0,0.04)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: F.text }}>Food & Groceries</span>
          <span style={{ fontSize: 12, ...blur }}>₦18,400 / ₦30,000</span>
        </div>
        <div style={{ height: 6, background: F.muted, borderRadius: 999, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: '61%', background: F.green, borderRadius: 999 }} />
        </div>
        <p style={{ fontSize: 11, color: F.textMuted, marginTop: 6 }}>61% of monthly budget used</p>
      </div>
      {/* Recent transactions */}
      <div style={{ padding: '16px 20px 0' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
          <span style={{ fontSize: 14, fontWeight: 700, color: F.text }}>Recent Activity</span>
          <span onClick={() => onNav('transactions')} style={{ fontSize: 11, fontWeight: 700, color: F.green, cursor: 'pointer' }}>View All</span>
        </div>
        {txns.map(t => (
          <div key={t.name} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '11px 0', borderBottom: `1px solid ${F.border}` }}>
            <span style={{ fontSize: 22 }}>{t.icon}</span>
            <div style={{ flex: 1 }}>
              <p style={{ fontSize: 13, fontWeight: 600, color: F.text }}>{t.name}</p>
              <p style={{ fontSize: 11, color: F.textMuted }}>{t.cat} · {t.date}</p>
            </div>
            <span style={{ fontSize: 14, fontWeight: 700, color: t.amount > 0 ? '#059669' : F.red, ...blur }}>
              {t.amount > 0 ? '+' : ''}₦{Math.abs(t.amount).toLocaleString()}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
};

const GoalsScreen = () => {
  const goals = [
    { name: 'Emergency Fund', target: 500000, saved: 320000, color: F.green, icon: '🛡️' },
    { name: 'MacBook Pro', target: 280000, saved: 140000, color: '#6366f1', icon: '💻' },
    { name: 'Lagos Trip', target: 80000, saved: 55000, color: '#f43f5e', icon: '✈️' },
  ];
  return (
    <div style={{ height: '100%', overflowY: 'auto', paddingBottom: 88, padding: '24px 20px 88px', background: F.warmBg }}>
      <p style={{ fontSize: 10, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.2em', color: F.green, marginBottom: 4 }}>Savings</p>
      <h1 style={{ fontSize: 28, fontWeight: 700, letterSpacing: '-0.02em', color: F.charcoal }}>Your Goals</h1>
      <p style={{ fontSize: 13, color: F.textMuted, marginTop: 4, marginBottom: 20 }}>Track your progress towards each target.</p>
      {goals.map(g => {
        const pct = Math.round((g.saved / g.target) * 100);
        return (
          <div key={g.name} style={{ background: 'white', borderRadius: 20, padding: '18px', marginBottom: 12, boxShadow: '0 2px 10px rgba(0,0,0,0.05)' }}>
            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 14 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{ width: 44, height: 44, borderRadius: 14, background: `${g.color}15`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>{g.icon}</div>
                <div><p style={{ fontSize: 15, fontWeight: 700, color: F.text }}>{g.name}</p><p style={{ fontSize: 12, color: F.textMuted }}>₦{g.saved.toLocaleString()} of ₦{g.target.toLocaleString()}</p></div>
              </div>
              <span style={{ fontSize: 18, fontWeight: 300, color: F.textMuted }}>{pct}%</span>
            </div>
            <div style={{ height: 6, background: F.muted, borderRadius: 999 }}><div style={{ height: '100%', width: `${pct}%`, background: g.color, borderRadius: 999, transition: 'width 0.5s' }} /></div>
          </div>
        );
      })}
      <button style={{ width: '100%', height: 52, background: F.charcoal, color: 'white', border: 'none', borderRadius: 18, fontSize: 15, fontWeight: 700, fontFamily: 'Outfit', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
        <Icon name="plus" size={18} color="white" /> Add New Goal
      </button>
    </div>
  );
};

const App = () => {
  const saved = localStorage.getItem('unclutter_finance_screen');
  const [screen, setScreen] = useState(saved || 'login');
  const [calmMode, setCalmMode] = useState(false);
  useEffect(() => { localStorage.setItem('unclutter_finance_screen', screen); }, [screen]);
  const showNav = !['login'].includes(screen);
  return (
    <div style={{ width: '100%', height: '100%', position: 'relative', overflow: 'hidden' }}>
      {screen === 'login' && <LoginScreen onLogin={() => setScreen('home')} />}
      {screen === 'home' && <HomeScreen onNav={setScreen} calmMode={calmMode} />}
      {screen === 'goals' && <GoalsScreen />}
      {['transactions','reports','settings'].includes(screen) && (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 12, paddingBottom: 88, background: F.warmBg }}>
          <span style={{ fontSize: 40 }}>{ screen === 'transactions' ? '💳' : screen === 'reports' ? '📊' : '⚙️' }</span>
          <p style={{ fontSize: 13, fontWeight: 700, color: F.textMuted }}>{screen.charAt(0).toUpperCase() + screen.slice(1)}</p>
          <p style={{ fontSize: 11, color: F.textFaint }}>Coming soon in this kit</p>
        </div>
      )}
      {showNav && <BottomNav active={screen} onNav={setScreen} />}
      {/* Calm mode toggle */}
      {showNav && (
        <button onClick={() => setCalmMode(c => !c)} style={{ position: 'absolute', top: 14, right: 64, width: 32, height: 32, borderRadius: 10, background: calmMode ? F.greenLight : F.muted, border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', zIndex: 60 }}>
          <Icon name={calmMode ? 'eyeOff' : 'eye'} size={15} color={calmMode ? F.green : F.textMuted} />
        </button>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div class="phone"><div id="root" style="width:100%;height:100%;"></div></div>
</body>
</html>
