<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unclutter Main — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #e5e3de; font-family: 'Outfit', sans-serif; display: flex; justify-content: center; padding: 24px 16px; min-height: 100vh; }
.phone { width: 390px; height: 844px; background: #FDFCF8; border-radius: 48px; overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.08); position: relative; }
</style>
</head>
<body>
<script type="text/babel">
const { useState, useEffect } = React;
const M = { gold: '#ffce0a', goldDim: '#F7B928', charcoal: '#2b2827', bg: '#FDFCF8', white: '#fff', muted: 'rgba(43,40,39,0.05)', border: 'rgba(43,40,39,0.08)', textMuted: 'rgba(43,40,39,0.45)', textFaint: 'rgba(43,40,39,0.2)' };

const apps = [
  { id: 'journal', name: 'Journal', sub: 'Reflect & record', color: '#ffce0a', dark: '#2b2827', icon: '📖', url: 'journal.unclutter.com.ng' },
  { id: 'finance', name: 'Finance', sub: 'Track & grow', color: '#10b981', dark: '#064e3b', icon: '💰', url: 'finance.unclutter.com.ng' },
  { id: 'estate', name: 'Estate', sub: 'Manage & monitor', color: '#2f9f45', dark: '#041920', icon: '🏠', url: 'estate.unclutter.com.ng' },
  { id: 'consult', name: 'Consult', sub: 'Book & connect', color: '#f43f5e', dark: '#881337', icon: '🩺', url: 'consult.unclutter.com.ng' },
  { id: 'learning', name: 'Learning', sub: 'Study & grow', color: '#6366f1', dark: '#312e81', icon: '📚', url: 'learning.unclutter.com.ng' },
];

const Logo = ({ size = 40 }) => (
  <svg width={size} height={size} viewBox="0 0 512 512" fill="none">
    <path d="M256 464C256 464 160 384 128 304C96 224 128 128 128 128C128 128 224 160 304 192C384 224 464 320 464 320C464 320 384 416 304 448C224 480 256 464 256 464Z" stroke={M.charcoal} strokeWidth="14" strokeLinecap="round" strokeLinejoin="round" fill={M.gold} fillOpacity="0.5"/>
    <path d="M256 464C256 464 352 384 384 304C416 224 384 128 384 128C384 128 288 160 208 192C128 224 48 320 48 320C48 320 128 416 208 448C288 480 256 464 256 464Z" stroke={M.charcoal} strokeWidth="14" strokeLinecap="round" strokeLinejoin="round" fill={M.gold} fillOpacity="0.5"/>
    <path d="M256 80V464" stroke={M.charcoal} strokeWidth="14" strokeLinecap="round"/>
  </svg>
);

const LoginScreen = ({ onLogin }) => (
  <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: M.bg, padding: '0 32px' }}>
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
      <Logo size={72} />
      <div style={{ textAlign: 'center' }}>
        <h1 style={{ fontSize: 34, fontWeight: 700, letterSpacing: '-0.03em', color: M.charcoal }}>Unclutter</h1>
        <p style={{ fontSize: 14, color: M.textMuted, fontStyle: 'italic', marginTop: 6 }}>"One account. Every part of your life."</p>
      </div>
    </div>
    <div style={{ paddingBottom: 60, display: 'flex', flexDirection: 'column', gap: 14 }}>
      <button onClick={onLogin} style={{ width: '100%', height: 56, background: M.charcoal, color: 'white', border: 'none', borderRadius: 20, fontSize: 16, fontWeight: 700, fontFamily: 'Outfit', cursor: 'pointer', boxShadow: '0 8px 24px rgba(43,40,39,0.2)' }}>Sign In</button>
      <button onClick={onLogin} style={{ width: '100%', height: 52, background: 'transparent', color: M.charcoal, border: `2px solid ${M.border}`, borderRadius: 18, fontSize: 15, fontWeight: 700, fontFamily: 'Outfit', cursor: 'pointer' }}>Create Account</button>
      <p style={{ textAlign: 'center', fontSize: 11, color: M.textFaint, marginTop: 4 }}>By continuing you agree to our Terms & Privacy Policy</p>
    </div>
  </div>
);

const HubScreen = () => {
  const [active, setActive] = useState(null);
  return (
    <div style={{ height: '100%', overflowY: 'auto', background: M.bg }}>
      {/* Header */}
      <div style={{ padding: '44px 28px 24px' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 24 }}>
          <Logo size={40} />
          <div style={{ width: 42, height: 42, borderRadius: 14, background: `${M.gold}20`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, border: `2px solid ${M.gold}30` }}>👤</div>
        </div>
        <h1 style={{ fontSize: 28, fontWeight: 700, letterSpacing: '-0.02em', color: M.charcoal, lineHeight: 1.2 }}>Welcome back,<br /><span style={{ color: M.gold }}>Alex.</span></h1>
        <p style={{ fontSize: 13, color: M.textMuted, marginTop: 6 }}>Which part of your life are you uncluttering today?</p>
      </div>

      {/* App grid */}
      <div style={{ padding: '0 20px 24px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
        {apps.map(app => (
          <div key={app.id} onClick={() => setActive(active === app.id ? null : app.id)} style={{ background: active === app.id ? app.dark : 'white', borderRadius: 28, padding: '20px 18px', cursor: 'pointer', boxShadow: active === app.id ? `0 20px 40px ${app.color}30` : '0 2px 8px rgba(0,0,0,0.04)', border: active === app.id ? 'none' : `1px solid ${M.border}`, transition: 'all 0.25s', position: 'relative', overflow: 'hidden' }}>
            {active === app.id && <div style={{ position: 'absolute', top: -20, right: -20, width: 80, height: 80, borderRadius: '50%', background: `${app.color}20` }} />}
            <div style={{ width: 48, height: 48, borderRadius: 16, background: active === app.id ? `${app.color}25` : `${app.color}15`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, marginBottom: 12, border: active === app.id ? `1px solid ${app.color}40` : 'none' }}>{app.icon}</div>
            <p style={{ fontSize: 16, fontWeight: 700, color: active === app.id ? 'white' : M.charcoal, letterSpacing: '-0.01em' }}>{app.name}</p>
            <p style={{ fontSize: 11, color: active === app.id ? 'rgba(255,255,255,0.5)' : M.textMuted, marginTop: 2 }}>{app.sub}</p>
            {active === app.id && (
              <div style={{ marginTop: 14, paddingTop: 14, borderTop: '1px solid rgba(255,255,255,0.1)' }}>
                <p style={{ fontSize: 10, color: 'rgba(255,255,255,0.35)', marginBottom: 8 }}>{app.url}</p>
                <button style={{ width: '100%', height: 38, background: app.color, color: app.color === '#ffce0a' ? M.charcoal : 'white', border: 'none', borderRadius: 12, fontSize: 12, fontWeight: 700, fontFamily: 'Outfit', cursor: 'pointer' }}>Open {app.name} →</button>
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Quick summary strip */}
      <div style={{ margin: '0 20px 20px', background: 'white', borderRadius: 24, padding: '16px 18px', border: `1px solid ${M.border}`, boxShadow: '0 2px 8px rgba(0,0,0,0.03)' }}>
        <p style={{ fontSize: 10, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.2em', color: M.textFaint, marginBottom: 12 }}>Today at a Glance</p>
        <div style={{ display: 'flex', justifyContent: 'space-between', gap: 12 }}>
          {[{ label: 'Check-in', val: '7 Day Rhythm', color: '#ffce0a', icon: '🔥' }, { label: 'Balance', val: '₦ 248k', color: '#10b981', icon: '💳' }, { label: 'Next Session', val: '3:00 PM', color: '#f43f5e', icon: '🩺' }].map(i => (
            <div key={i.label} style={{ flex: 1, textAlign: 'center' }}>
              <span style={{ fontSize: 18 }}>{i.icon}</span>
              <p style={{ fontSize: 13, fontWeight: 700, color: M.charcoal, marginTop: 4 }}>{i.val}</p>
              <p style={{ fontSize: 9, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.1em', color: M.textFaint, marginTop: 2 }}>{i.label}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Footer */}
      <div style={{ padding: '0 24px 32px', textAlign: 'center' }}>
        <p style={{ fontSize: 10, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.2em', color: M.textFaint }}>unclutter.com.ng</p>
      </div>
    </div>
  );
};

const App = () => {
  const saved = localStorage.getItem('unclutter_main_screen');
  const [screen, setScreen] = useState(saved || 'login');
  useEffect(() => { localStorage.setItem('unclutter_main_screen', screen); }, [screen]);
  return (
    <div style={{ width: '100%', height: '100%', position: 'relative', overflow: 'hidden' }}>
      {screen === 'login' && <LoginScreen onLogin={() => setScreen('hub')} />}
      {screen === 'hub' && <HubScreen />}
    </div>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div class="phone"><div id="root" style="width:100%;height:100%;"></div></div>
</body>
</html>
