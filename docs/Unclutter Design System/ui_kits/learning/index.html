<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unclutter Learning — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #eef0f8; font-family: 'Outfit', sans-serif; display: flex; justify-content: center; padding: 24px 16px; min-height: 100vh; }
.phone { width: 390px; height: 844px; background: #f8f9fc; border-radius: 48px; overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.08); position: relative; }
</style>
</head>
<body>
<script type="text/babel">
const { useState, useEffect } = React;
const L = { indigo: '#6366f1', indigoLight: '#e0e7ff', indigoDark: '#312e81', indigoText: '#4338ca', charcoal: '#2b2827', bg: '#f8f9fc', white: '#fff', muted: '#f1f5f9', border: '#e2e8f0', text: '#1e293b', textMuted: '#64748b', textFaint: 'rgba(30,41,59,0.3)', gold: '#ffce0a' };

const Logo = ({ size = 28 }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
    <svg width={size} height={size} viewBox="0 0 512 512" fill="none">
      <path d="M256 464C256 464 160 384 128 304C96 224 128 128 128 128C128 128 224 160 304 192C384 224 464 320 464 320C464 320 384 416 304 448C224 480 256 464 256 464Z" stroke={L.indigoDark} strokeWidth="14" strokeLinecap="round" strokeLinejoin="round" fill={L.indigo} fillOpacity="0.25"/>
      <path d="M256 464C256 464 352 384 384 304C416 224 384 128 384 128C384 128 288 160 208 192C128 224 48 320 48 320C48 320 128 416 208 448C288 480 256 464 256 464Z" stroke={L.indigoDark} strokeWidth="14" strokeLinecap="round" strokeLinejoin="round" fill={L.indigo} fillOpacity="0.25"/>
      <path d="M256 80V464" stroke={L.indigoDark} strokeWidth="14" strokeLinecap="round"/>
    </svg>
    <span style={{ fontSize: 15, fontWeight: 700, letterSpacing: '-0.02em', color: L.text }}><span style={{ color: L.indigo }}>Un</span>clutter <span style={{ fontSize: 9, fontWeight: 500, color: L.textFaint }}>Learning</span></span>
  </div>
);

const Icon = ({ name, size = 20, color = L.textMuted }) => {
  const p = {
    home: <><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
    book: <><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>,
    calendar: <><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
    barChart: <><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,
    user: <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
    play: <><polygon points="5 3 19 12 5 21 5 3"/></>,
    chevRight: <><polyline points="9 18 15 12 9 6"/></>,
    check: <><polyline points="20 6 9 17 4 12"/></>,
    clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
    award: <><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></>,
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">{p[name]}</svg>;
};

const ProgressRing = ({ pct, size = 52, color = L.indigo }) => {
  const r = (size - 8) / 2, circ = 2 * Math.PI * r;
  return (
    <svg width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={L.muted} strokeWidth={5} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={5} strokeDasharray={circ} strokeDashoffset={circ * (1 - pct / 100)} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} />
      <text x={size/2} y={size/2 + 4} textAnchor="middle" style={{ fontSize: 12, fontWeight: 700, fill: color }}>{pct}%</text>
    </svg>
  );
};

const BottomNav = ({ active, onNav }) => {
  const items = [{ id: 'home', label: 'Home', icon: 'home' }, { id: 'courses', label: 'Courses', icon: 'book' }, { id: 'calendar', label: 'Calendar', icon: 'calendar' }, { id: 'progress', label: 'Progress', icon: 'barChart' }, { id: 'profile', label: 'Profile', icon: 'user' }];
  return (
    <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, display: 'grid', gridTemplateColumns: 'repeat(5,1fr)', padding: '10px 8px 18px', background: 'rgba(255,255,255,0.92)', backdropFilter: 'blur(20px)', borderTop: `1px solid ${L.border}`, boxShadow: '0 -4px 20px rgba(0,0,0,0.04)', zIndex: 50 }}>
      {items.map(i => (
        <button key={i.id} onClick={() => onNav(i.id)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '6px 4px', borderRadius: 10, border: 'none', cursor: 'pointer', background: active === i.id ? L.charcoal : 'transparent' }}>
          <Icon name={i.icon} size={18} color={active === i.id ? L.gold : L.textFaint} />
          <span style={{ fontSize: 9, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.1em', color: active === i.id ? 'white' : L.textFaint }}>{i.label}</span>
        </button>
      ))}
    </div>
  );
};

const HomeScreen = ({ onNav }) => {
  const courses = [
    { title: 'Personal Finance 101', lessons: 12, done: 8, color: '#10b981', icon: '💰' },
    { title: 'Mental Wellness', lessons: 10, done: 3, color: '#f43f5e', icon: '🧠' },
    { title: 'Property Management', lessons: 8, done: 8, color: '#2f9f45', icon: '🏠' },
  ];
  return (
    <div style={{ height: '100%', overflowY: 'auto', paddingBottom: 88, background: L.bg }}>
      <div style={{ padding: '36px 24px 20px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <Logo size={30} />
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 36, height: 36, borderRadius: '50%', background: `${L.indigo}20`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, fontWeight: 800, color: L.indigoText }}>A</div>
          </div>
        </div>
        <p style={{ fontSize: 10, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.2em', color: L.indigo, marginBottom: 4 }}>Dashboard</p>
        <h1 style={{ fontSize: 26, fontWeight: 700, letterSpacing: '-0.02em', color: L.text }}>Keep learning,<br /><span style={{ color: L.indigo }}>Alex.</span></h1>
        <p style={{ fontSize: 13, color: L.textMuted, marginTop: 4 }}>You've completed 3 of 5 courses this month.</p>
      </div>

      {/* Stats row */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, padding: '0 24px 18px' }}>
        {[['Courses','3 Active',L.indigo],['Hours','14.5','#f43f5e'],['Streak','7 Days',L.gold]].map(([l,v,c]) => (
          <div key={l} style={{ background: 'white', borderRadius: 16, padding: '12px', textAlign: 'center', boxShadow: '0 2px 8px rgba(0,0,0,0.04)' }}>
            <p style={{ fontSize: 16, fontWeight: 700, color: c, letterSpacing: '-0.02em' }}>{v}</p>
            <p style={{ fontSize: 9, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.1em', color: L.textFaint, marginTop: 3 }}>{l}</p>
          </div>
        ))}
      </div>

      {/* Continue */}
      <div style={{ padding: '0 24px 6px' }}>
        <p style={{ fontSize: 10, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.2em', color: L.textMuted, marginBottom: 10 }}>Continue Learning</p>
        <div onClick={() => onNav('courses')} style={{ background: L.charcoal, borderRadius: 28, padding: '20px 22px', cursor: 'pointer', position: 'relative', overflow: 'hidden', boxShadow: '0 12px 30px rgba(43,40,39,0.15)', marginBottom: 14 }}>
          <div style={{ position: 'absolute', top: 0, right: 0, width: 70, height: 70, background: `${L.indigo}25`, borderRadius: '0 28px 0 70px' }} />
          <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
            <div style={{ width: 56, height: 56, borderRadius: 18, background: `${L.indigo}25`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 26 }}>💰</div>
            <div>
              <p style={{ fontSize: 16, fontWeight: 700, color: 'white', lineHeight: 1.2 }}>Personal Finance 101</p>
              <p style={{ fontSize: 12, color: 'rgba(255,255,255,0.45)', marginTop: 2 }}>Lesson 9 · Budgeting Fundamentals</p>
            </div>
          </div>
          <div style={{ marginTop: 16 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
              <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.4)' }}>8 of 12 lessons complete</span>
              <span style={{ fontSize: 10, color: L.gold, fontWeight: 700 }}>67%</span>
            </div>
            <div style={{ height: 5, background: 'rgba(255,255,255,0.1)', borderRadius: 999 }}><div style={{ height: '100%', width: '67%', background: L.indigo, borderRadius: 999 }} /></div>
          </div>
          <button style={{ marginTop: 14, height: 42, padding: '0 20px', background: L.indigo, color: 'white', border: 'none', borderRadius: 12, fontSize: 13, fontWeight: 700, fontFamily: 'Outfit', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6 }}><Icon name="play" size={14} color="white" /> Continue</button>
        </div>
      </div>

      {/* Course list */}
      <div style={{ padding: '0 24px' }}>
        <p style={{ fontSize: 10, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.2em', color: L.textMuted, marginBottom: 10 }}>All Courses</p>
        {courses.map(c => (
          <div key={c.title} style={{ background: 'white', borderRadius: 20, padding: '14px 16px', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 14, boxShadow: '0 2px 6px rgba(0,0,0,0.04)', cursor: 'pointer' }}>
            <div style={{ width: 44, height: 44, borderRadius: 14, background: `${c.color}15`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>{c.icon}</div>
            <div style={{ flex: 1 }}>
              <p style={{ fontSize: 13, fontWeight: 700, color: L.text }}>{c.title}</p>
              <p style={{ fontSize: 11, color: L.textMuted }}>{c.done}/{c.lessons} lessons</p>
              <div style={{ height: 4, background: L.muted, borderRadius: 999, marginTop: 6 }}><div style={{ height: '100%', width: `${Math.round(c.done/c.lessons*100)}%`, background: c.color, borderRadius: 999 }} /></div>
            </div>
            <ProgressRing pct={Math.round(c.done/c.lessons*100)} size={44} color={c.color} />
          </div>
        ))}
      </div>
    </div>
  );
};

const App = () => {
  const saved = localStorage.getItem('unclutter_learning_screen');
  const [screen, setScreen] = useState(saved || 'home');
  useEffect(() => { localStorage.setItem('unclutter_learning_screen', screen); }, [screen]);
  return (
    <div style={{ width: '100%', height: '100%', position: 'relative', overflow: 'hidden' }}>
      {screen === 'home' && <HomeScreen onNav={setScreen} />}
      {['courses','calendar','progress','profile'].includes(screen) && (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 12, paddingBottom: 88, background: L.bg }}>
          <span style={{ fontSize: 40 }}>{screen === 'courses' ? '📚' : screen === 'calendar' ? '📅' : screen === 'progress' ? '📊' : '👤'}</span>
          <p style={{ fontSize: 13, fontWeight: 700, color: L.textMuted }}>{screen.charAt(0).toUpperCase() + screen.slice(1)}</p>
          <p style={{ fontSize: 11, color: L.textFaint }}>Coming soon in this kit</p>
        </div>
      )}
      <BottomNav active={screen} onNav={setScreen} />
    </div>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div class="phone"><div id="root" style="width:100%;height:100%;"></div></div>
</body>
</html>
