const Logo = ({ size = 28, light = false }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
    <svg width={size} height={size} viewBox="0 0 512 512" fill="none">

  const s = styles[type] || styles.credit;
  return <span style={{ background: s.bg, color: s.color, fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.12em', borderRadius: 999, padding: '4px 10px', display: 'inline-flex', alignItems: 'center' }}>{children}</span>;
};

const BottomNav = ({ active, onNav }) => {
  const items = [
    { id: 'dashboard', label: 'Home', icon: 'home' },
    { id: 'occupants', label: 'Units', icon: 'grid' },
    { id: 'meters', label: 'Meters', icon: 'zap' },
    { id: 'records', label: 'Records', icon: 'list' },
    { id: 'setup', label: 'Setup', icon: 'settings' },
  ];
  return (
    <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, display: 'grid', gridTemplateColumns: 'repeat(5,1fr)', gap: 2, padding: '10px 10px 18px', background: 'rgba(255,255,255,0.88)', backdropFilter: 'blur(20px)', borderTop: `1px solid rgba(226,232,240,0.6)`, boxShadow: '0 -4px 20px rgba(0,0,0,0.04)', zIndex: 50 }}>
      {items.map(item => (
        <button key={item.id} onClick={() => onNav(item.id)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '6px 4px', borderRadius: 10, border: 'none', cursor: 'pointer', background: active === item.id ? E.dark : 'transparent', transition: 'background 0.2s' }}>
          <Icon name={item.icon} size={18} color={active === item.id ? E.greenLight : E.textFaint} />
          <span style={{ fontSize: 9, fontWeight: 700, color: active === item.id ? 'white' : E.textFaint, fontFamily: 'Manrope' }}>{item.label}</span>

    </div>
  );
};

  <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: E.dark, color: 'white', overflow: 'hidden', position: 'relative' }}>
    <div style={{ position: 'absolute', top: '50%', left: -60, width: 200, height: '70vh', transform: 'translateY(-50%)', borderRadius: 999, background: 'radial-gradient(circle at center, rgba(160,243,153,0.9), rgba(160,243,153,0) 70%)', filter: 'blur(14px)', opacity: 0.8 }} />

        <button onClick={onLogin} style={{ width: '100%', height: 52, background: E.dark, border: `1px solid ${E.greenLight}`, borderRadius: 14, fontSize: 14, fontWeight: 700, fontFamily: 'Manrope', color: 'white', cursor: 'pointer', marginTop: 4, boxShadow: `0 0 24px rgba(160,243,153,0.15)` }}>Sign In to Estate</button>

  </div>
);

            <p style={{ fontSize: 16, fontWeight: 800, color: E.text }}>{m.name}</p>
            <p style={{ fontSize: 12, color: E.textMuted, marginTop: 2 }}>Rate: {m.rate}</p>
          </div>
          <Badge type="credit">{m.status}</Badge>
        </div>
        <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${E.border}`, display: 'flex', justifyContent: 'space-between' }}>
          <div><p style={{ fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.14em', color: E.textMuted }}>Last Reading</p><p style={{ fontSize: 18, fontWeight: 800, letterSpacing: '-0.04em', color: E.text, marginTop: 2 }}>{m.last}</p></div>
          <button style={{ background: E.dark, color: 'white', border: 'none', borderRadius: 12, padding: '8px 16px', fontFamily: 'Manrope', fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>Record</button>
        </div>
      </div>
    ))}
  </div>
);

const App = () => {
  const saved = localStorage.getItem('unclutter_estate_screen');
  const [screen, setScreen] = useState(saved || 'login');
  useEffect(() => { localStorage.setItem('unclutter_estate_screen', screen); }, [screen]);
  const showNav = !['login'].includes(screen);
  return (
    <div style={{ width: '100%', height: '100%', position: 'relative', overflow: 'hidden' }}>
      {screen === 'login' && <LoginScreen onLogin={() => setScreen('dashboard')} />}
      {screen === 'dashboard' && <DashboardScreen />}
      {screen === 'occupants' && <OccupantsScreen />}
      {screen === 'meters' && <MetersScreen />}
      {['records','setup'].includes(screen) && (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 12, paddingBottom: 88, background: E.bg }}>
          <div style={{ width: 56, height: 56, borderRadius: 16, background: E.muted, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name={screen === 'records' ? 'list' : 'settings'} size={24} color={E.textMuted} /></div>
          <p style={{ fontSize: 13, fontWeight: 700, color: E.textMuted }}>{screen === 'records' ? 'Transaction Records' : 'Property Setup'}</p>
          <p style={{ fontSize: 11, color: E.textFaint }}>Coming soon in this kit</p>
        </div>
      )}
      {showNav && <BottomNav active={screen} onNav={setScreen} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div class="phone"><div id="root" style="width:100%;height:100%;"></div></div>
</body>
</html>
