// ── Bottom Nav ──
const BottomNav = ({ active, onNav }) => {
  const items = [

    { id: 'journal', label: 'Journal', icon: 'book' },
    { id: 'community', label: 'Wall', icon: 'users' },
    { id: 'profile', label: 'Profile', icon: 'user' },

  return (
    <div style={{ position: 'fixed', bottom: 0, left: '50%', transform: 'translateX(-50%)', width: 390, display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 4, padding: '10px 12px 20px', background: 'rgba(255,255,255,0.88)', backdropFilter: 'blur(20px)', borderTop: `1px solid ${C.border}`, boxShadow: '0 -4px 20px rgba(0,0,0,0.04)', zIndex: 50 }}>

  const emotions = [
    { id: 'good_vibes', label: 'Good Vibes', bg: 'rgba(255,206,10,0.12)', color: '#b8860b', emoji: '😊' },
    { id: 'just_okay', label: 'Just Okay', bg: 'rgba(100,116,139,0.1)', color: '#475569', emoji: '😐' },
    { id: 'rough_patch', label: 'Rough Patch', bg: 'rgba(239,68,68,0.1)', color: '#dc2626', emoji: '😔' },
    { id: 'fired_up', label: 'Fired Up', bg: 'rgba(249,115,22,0.1)', color: '#ea580c', emoji: '🔥' },
  ];
  return (
    <div style={{ flex: 1, background: 'white', position: 'relative', overflowY: 'auto' }}>
      <button onClick={onBack} style={{ position: 'absolute', top: 20, right: 20, width: 40, height: 40, borderRadius: '50%', background: C.muted, border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', zIndex: 10 }}><Icon name="x" size={18} color={C.textMuted} /></button>
      {step === 'emotion' && (
        <div style={{ padding: '72px 32px 32px', display: 'flex', flexDirection: 'column', gap: 32 }}>
          <div style={{ display: 'flex', flex: 'column', gap: 12 }}>
            <div style={{ width: 48, height: 48, borderRadius: 16, background: 'rgba(255,206,10,0.12)', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 12 }}><Icon name="sun" size={24} color="#e6a800" /></div>
            <h1 style={{ fontSize: 30, fontWeight: 700, letterSpacing: '-0.02em', color: C.charcoal, lineHeight: 1.2 }}>Good morning.</h1>
            <p style={{ fontSize: 18, color: C.textMuted, fontWeight: 300, marginTop: 6 }}>Begin where you are. No preparation needed.</p>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
            {emotions.map(e => (
              <button key={e.id} onClick={() => { setSelected(e); setStep('write'); setText(`${e.id === 'good_vibes' ? "Right now I'm feeling grateful because " : e.id === 'fired_up' ? "The energy I feel is coming from " : e.id === 'rough_patch' ? "What feels hardest right now is " : "At this moment, what I notice most is "}`); }} style={{ background: e.bg, border: `2px solid ${e.color}30`, borderRadius: 32, padding: '24px 16px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10, cursor: 'pointer', fontFamily: 'Outfit' }}>
                <span style={{ fontSize: 40 }}>{e.emoji}</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: e.color }}>{e.label}</span>
              </button>
            ))}
          </div>
        </div>
      )}
      {step === 'write' && (
        <div style={{ padding: '72px 32px 32px', display: 'flex', flexDirection: 'column', gap: 24 }}>
          <button onClick={() => setStep('emotion')} style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'none', border: 'none', color: C.textMuted, cursor: 'pointer', fontFamily: 'Outfit', fontSize: 13, alignSelf: 'flex-start' }}><Icon name="arrowLeft" size={16} color={C.textMuted} /> Back</button>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <div style={{ width: 48, height: 48, borderRadius: 16, background: C.charcoal, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 4 }}><Icon name="heart" size={24} color={C.gold} /></div>
            <h2 style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.02em', lineHeight: 1.35, color: C.charcoal }}>What does this feeling want to say?</h2>
            <p style={{ fontSize: 11, color: C.textFaint }}>Start anywhere. Even one sentence is enough.</p>
            <p style={{ fontSize: 11, color: C.textFaint }}>Private unless you choose to share.</p>
          </div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {["Right now, I feel…","Something on my mind…","Today has been…"].map(chip => (
              <button key={chip} onClick={() => setText(t => t + chip + ' ')} style={{ padding: '6px 14px', borderRadius: 999, fontSize: 11, background: C.muted, border: 'none', color: C.textMuted, cursor: 'pointer', fontFamily: 'Outfit' }}>{chip}</button>
            ))}
          </div>
          <textarea value={text} onChange={e => setText(e.target.value)} style={{ flex: 1, minHeight: 200, fontSize: 16, lineHeight: 1.6, border: 'none', outline: 'none', resize: 'none', background: 'transparent', fontFamily: 'Outfit', color: C.charcoal }} />
          <button onClick={() => setStep('done')} style={{ width: '100%', height: 56, background: C.charcoal, color: 'white', border: 'none', borderRadius: 20, fontSize: 16, fontWeight: 700, fontFamily: 'Outfit', cursor: 'pointer', boxShadow: '0 8px 24px rgba(43,40,39,0.15)' }}>I'm done for now</button>
        </div>
      )}
      {step === 'done' && (
        <div style={{ padding: '80px 32px 32px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 24, textAlign: 'center' }}>
          <div style={{ width: 96, height: 96, background: 'rgba(255,206,10,0.12)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="heart" size={48} color={C.gold} /></div>
          <div><h3 style={{ fontSize: 24, fontWeight: 700, color: C.charcoal }}>Reflection Saved 🌿</h3><p style={{ color: C.textMuted, marginTop: 4 }}>Something you wrote stood out.</p></div>
          <div style={{ width: '100%', background: 'rgba(43,40,39,0.03)', border: `1px solid ${C.border}`, borderRadius: 20, padding: 16, textAlign: 'left' }}>
            <p style={{ fontSize: 13, color: C.textMuted, lineHeight: 1.6 }}>"{text.slice(0, 120)}{text.length > 120 ? '…' : ''}"</p>
          </div>
          <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 10 }}>
            <button style={{ width: '100%', height: 52, background: C.charcoal, color: 'white', border: 'none', borderRadius: 18, fontSize: 15, fontWeight: 700, fontFamily: 'Outfit', cursor: 'pointer' }}>View reflection</button>
            <button onClick={onBack} style={{ width: '100%', height: 48, background: C.muted, color: C.charcoal, border: 'none', borderRadius: 18, fontSize: 14, fontWeight: 700, fontFamily: 'Outfit', cursor: 'pointer' }}>Go home</button>
          </div>
        </div>
      )}
    </div>
  );
};

// ── Profile Screen ──
const ProfileScreen = () => (
  <div style={{ flex: 1, background: C.bg, paddingBottom: 96, overflowY: 'auto' }}>
    <div style={{ padding: '40px 24px 24px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
      <div style={{ width: 80, height: 80, borderRadius: '50%', background: `${C.gold}22`, border: `2px solid ${C.gold}44`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 32 }}>🧘</div>
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 22, fontWeight: 700, color: C.charcoal }}>Alex Okafor</div>
        <div style={{ fontSize: 12, color: C.textMuted }}>alex@unclutter.com.ng</div>
      </div>
      <div style={{ display: 'flex', gap: 20, marginTop: 8 }}>
        {[['42','Reflections'],['7','Day Rhythm'],['4','Journals']].map(([v,l]) => (
          <div key={l} style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 22, fontWeight: 700, color: C.charcoal }}>{v}</div>
            <div style={{ fontSize: 10, fontWeight: 900, textTransform: 'uppercase', letterSpacing: '0.1em', color: C.textMuted }}>{l}</div>
          </div>
        ))}
      </div>
    </div>
    <div style={{ padding: '0 24px', display: 'flex', flexDirection: 'column', gap: 8 }}>
      {[['Settings','⚙️'],['Notifications','🔔'],['Privacy','🔒'],['Help','❓']].map(([label, icon]) => (
        <div key={label} style={{ background: 'white', borderRadius: 20, padding: '16px 18px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer', border: `1px solid ${C.border}` }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <span style={{ fontSize: 18 }}>{icon}</span>
            <span style={{ fontSize: 15, fontWeight: 600, color: C.charcoal }}>{label}</span>
          </div>
          <Icon name="chevronRight" size={18} color={C.textFaint} />
        </div>
      ))}
      <button style={{ width: '100%', height: 48, background: 'rgba(186,26,26,0.06)', color: '#ba1a1a', border: 'none', borderRadius: 16, fontSize: 14, fontWeight: 700, fontFamily: 'Outfit', cursor: 'pointer', marginTop: 8 }}>Sign Out</button>
    </div>
  </div>
);

// ── App ──
const App = () => {
  const saved = localStorage.getItem('unclutter_journal_screen');
  const [screen, setScreen] = useState(saved || 'login');

  useEffect(() => { localStorage.setItem('unclutter_journal_screen', screen); }, [screen]);

  const handleNav = (s) => setScreen(s);

  const showNav = !['login','checkin'].includes(screen);

  return (
    <div style={{ position: 'relative', width: '100%', height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {screen === 'login' && <LoginScreen onLogin={() => setScreen('home')} />}
      {screen === 'home' && <HomeScreen onNav={handleNav} />}
      {screen === 'journal' && <JournalListScreen />}
      {screen === 'profile' && <ProfileScreen />}
      {screen === 'community' && (
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', background: C.bg, flexDirection: 'column', gap: 12, paddingBottom: 96 }}>
          <span style={{ fontSize: 48 }}>🌍</span>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.textMuted }}>Community Wall</div>
          <div style={{ fontSize: 12, color: C.textFaint }}>Coming soon in this kit</div>
        </div>
      )}
      {screen === 'checkin' && <CheckinScreen onBack={() => setScreen('home')} />}
      {showNav && <BottomNav active={['home','journal','community','profile'].includes(screen) ? screen : 'home'} onNav={handleNav} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root" style="width:390px;height:844px;border-radius:48px;overflow:hidden;"></div>
</body>
</html>
