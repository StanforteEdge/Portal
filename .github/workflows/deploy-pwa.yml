name: Deploy PWA (Server)

on:
  push:
    branches: [main]
    paths:
      - "PWA/**"
      - ".github/workflows/deploy-pwa.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: PWA

      - name: Build
        run: npm run build
        working-directory: PWA

      - name: Ensure PWA web directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PWA_SSH_HOST }}
          username: ${{ secrets.PWA_SSH_USER }}
          key: ${{ secrets.PWA_SSH_PRIVATE_KEY }}
          script: |
            mkdir -p "${{ secrets.PWA_WEB_DIR }}"

      - name: Upload PWA dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PWA_SSH_HOST }}
          username: ${{ secrets.PWA_SSH_USER }}
          key: ${{ secrets.PWA_SSH_PRIVATE_KEY }}
          source: "PWA/dist/*"
          target: ${{ secrets.PWA_WEB_DIR }}
          strip_components: 2
          overwrite: true
