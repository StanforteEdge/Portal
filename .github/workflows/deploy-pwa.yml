name: Deploy PWA (Server)

on:
  push:
    branches: [main]
    paths:
      - "PWA/**"
      - ".github/workflows/deploy-pwa.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Compute build metadata
        id: build_meta
        run: |
          APP_VERSION=$(node -p "require('./PWA/package.json').version")
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm install --include=optional --no-audit --no-fund
        working-directory: PWA

      - name: Work around npm optional dependency bug (rollup linux binary)
        run: npm install @rollup/rollup-linux-x64-gnu --no-save --no-audit --no-fund
        working-directory: PWA

      - name: Build
        run: npm run build
        working-directory: PWA
        env:
          VITE_API_BASE_URL: ${{ secrets.PWA_API_BASE_URL }}
          VITE_APP_BASE_PATH: ${{ secrets.PWA_BASE_PATH }}
          VITE_APP_VERSION: ${{ steps.build_meta.outputs.app_version }}
          VITE_APP_COMMIT_SHA: ${{ steps.build_meta.outputs.commit_sha }}

      - name: Write version manifest
        run: |
          cat > PWA/dist/version.json <<EOF
          {
            "version": "${{ steps.build_meta.outputs.app_version }}",
            "commit": "${{ steps.build_meta.outputs.commit_sha }}",
            "built_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

      - name: Ensure PWA web directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PWA_SSH_HOST }}
          username: ${{ secrets.PWA_SSH_USER }}
          key: ${{ secrets.PWA_SSH_PRIVATE_KEY }}
          script: |
            mkdir -p "${{ secrets.PWA_WEB_DIR }}"

      - name: Upload PWA dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PWA_SSH_HOST }}
          username: ${{ secrets.PWA_SSH_USER }}
          key: ${{ secrets.PWA_SSH_PRIVATE_KEY }}
          source: "PWA/dist/*"
          target: ${{ secrets.PWA_WEB_DIR }}
          strip_components: 2
          overwrite: true
