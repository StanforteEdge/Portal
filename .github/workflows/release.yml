name: Release

on:
  push:
    branches: [main]
    paths:
      - "apps/pwa/**"
      - "apps/shared/**"
      - ".github/workflows/release.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            artifact-name: macos-arm
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            artifact-name: macos-intel
          - platform: ubuntu-22.04
            args: ""
            artifact-name: linux
          - platform: windows-latest
            args: ""
            artifact-name: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/pwa/src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install root dependencies
        run: npm ci

      - name: Install pwa dependencies
        working-directory: apps/pwa
        run: npm install

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(node -e "process.stdout.write(require('./apps/pwa/package.json').version)")
          echo "app_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_BASE_URL: ${{ secrets.PWA_API_BASE_URL }}
        with:
          projectPath: apps/pwa
          args: ${{ matrix.args }}

      - name: Collect artifacts (macOS ARM)
        if: matrix.artifact-name == 'macos-arm'
        run: |
          mkdir -p dist-artifacts
          cp apps/pwa/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg dist-artifacts/ || true

      - name: Collect artifacts (macOS Intel)
        if: matrix.artifact-name == 'macos-intel'
        run: |
          mkdir -p dist-artifacts
          cp apps/pwa/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg dist-artifacts/ || true

      - name: Collect artifacts (Linux)
        if: matrix.artifact-name == 'linux'
        run: |
          mkdir -p dist-artifacts
          cp apps/pwa/src-tauri/target/release/bundle/appimage/*.AppImage dist-artifacts/ || true
          cp apps/pwa/src-tauri/target/release/bundle/deb/*.deb dist-artifacts/ || true

      - name: Collect artifacts (Windows)
        if: matrix.artifact-name == 'windows'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          cp apps/pwa/src-tauri/target/release/bundle/nsis/*.exe dist-artifacts/ || true
          cp apps/pwa/src-tauri/target/release/bundle/msi/*.msi dist-artifacts/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist-artifacts/
          if-no-files-found: warn

  deploy-downloads:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(node -e "process.stdout.write(require('./apps/pwa/package.json').version)")
          echo "app_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten into versioned folder
        run: |
          VERSION="${{ steps.version.outputs.app_version }}"
          mkdir -p "downloads/v${VERSION}"
          find all-artifacts -type f \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.exe" -o -name "*.msi" \) \
            -exec cp {} "downloads/v${VERSION}/" \;
          echo "Files for v${VERSION}:"
          ls -lh "downloads/v${VERSION}/"

      - name: Ensure downloads directory on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PWA_SSH_HOST }}
          username: ${{ secrets.PWA_SSH_USER }}
          key: ${{ secrets.PWA_SSH_PRIVATE_KEY }}
          script: |
            mkdir -p "${{ secrets.PWA2_WEB_DIR }}/downloads/v${{ steps.version.outputs.app_version }}"

      - name: Upload binaries to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PWA_SSH_HOST }}
          username: ${{ secrets.PWA_SSH_USER }}
          key: ${{ secrets.PWA_SSH_PRIVATE_KEY }}
          source: "downloads/v${{ steps.version.outputs.app_version }}/*"
          target: "${{ secrets.PWA2_WEB_DIR }}/downloads/v${{ steps.version.outputs.app_version }}"
          strip_components: 2
          overwrite: true
