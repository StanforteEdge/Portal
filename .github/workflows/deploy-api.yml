name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate -w api

      - name: Build API
        run: npm run build -w api

      - name: Upload code to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.API_SSH_HOST }}
          username: ${{ secrets.API_SSH_USER }}
          key: ${{ secrets.API_SSH_PRIVATE_KEY }}
          source: "."
          target: ${{ secrets.API_APP_DIR }}
          overwrite: true

      - name: Run server deploy commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.API_SSH_HOST }}
          username: ${{ secrets.API_SSH_USER }}
          key: ${{ secrets.API_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd "${{ secrets.API_APP_DIR }}"
            npm ci
            npm run prisma:generate -w api
            npm run build -w api
            npm run prisma:migrate -w api
            npm run seed:release-baseline -w api
            pm2 startOrReload api/ecosystem.config.cjs --env production
