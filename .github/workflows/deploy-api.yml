name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate -w api

      - name: Build API
        run: npm run build -w api

      - name: Run server deploy commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.API_SSH_HOST }}
          username: ${{ secrets.API_SSH_USER }}
          key: ${{ secrets.API_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd "${{ secrets.API_APP_DIR }}"
            pwd
            ls -la
            ls -la .git
            git fetch origin
            git checkout main
            git pull origin main
            export DATABASE_URL="$(grep '^DATABASE_URL=' api/.env | cut -d= -f2-)"
            npm install
            npm run deploy:server
            node api/scripts/seed-rbac.js
            npm run seed:release-baseline -w api
            pm2 startOrReload api/ecosystem.config.cjs --env production
