name: Deploy PWA2 (Server)

on:
  push:
    branches: [main]
    paths:
      - "apps/pwa/**"
      - "apps/shared/**"
      - ".github/workflows/deploy-pwa2.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Compute build metadata
        id: build_meta
        run: |
          APP_VERSION=$(node -p "require('./apps/pwa/package.json').version")
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build PWA2
        run: npm run build:pwa2
        env:
          VITE_API_BASE_URL: ${{ secrets.PWA_API_BASE_URL }}
          VITE_APP_BASE_PATH: ${{ secrets.PWA2_BASE_PATH }}
          VITE_APP_VERSION: ${{ steps.build_meta.outputs.app_version }}
          VITE_APP_COMMIT_SHA: ${{ steps.build_meta.outputs.commit_sha }}

      - name: Write version manifest
        run: |
          cat > apps/pwa/dist/version.json <<EOF
          {
            "version": "${{ steps.build_meta.outputs.app_version }}",
            "commit": "${{ steps.build_meta.outputs.commit_sha }}",
            "built_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

      - name: Ensure PWA2 web directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PWA_SSH_HOST }}
          username: ${{ secrets.PWA_SSH_USER }}
          key: ${{ secrets.PWA_SSH_PRIVATE_KEY }}
          script: |
            mkdir -p "${{ secrets.PWA2_WEB_DIR }}"

      - name: Upload PWA2 dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PWA_SSH_HOST }}
          username: ${{ secrets.PWA_SSH_USER }}
          key: ${{ secrets.PWA_SSH_PRIVATE_KEY }}
          source: "apps/pwa/dist/*"
          target: ${{ secrets.PWA2_WEB_DIR }}
          strip_components: 3
          overwrite: true
